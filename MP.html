<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPD Practicals</title>

    <!-- External CSS (You can paste your CSS here or link style.css) -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* Fallback if external CSS not used */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            overflow-x: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: pageLoad 1s ease forwards;
        }

        @keyframes pageLoad {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s ease;
        }
        /* 🌊 Wave Background */
        #waveCanvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: -2;
        }

        /* ✨ Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
        }

        /* 💜 Neon Glow Layer */
        .neon-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,0,255,0.2), transparent 40%), radial-gradient(circle at 80% 70%, rgba(0,255,255,0.2), transparent 40%);
            z-index: -4;
        }
    </style>
</head>

<body id="body">

    <canvas id="particleCanvas"></canvas>
    <canvas id="waveCanvas"></canvas>
    <div class="neon-bg"></div>

    <div class="cursor-glow" id="glow"></div>

    <header>
        <h1>WPD Practicals </h1>
        <p></p>
    </header>

    <div class="top-bar">
        <input type="text" class="search-box" id="search" placeholder="🔍 Search practical...">
        <button class="toggle" onclick="toggleMode()"></button>
    </div>

    <!-- Prism Background (Converted from your React TS) -->
    <div id="prism-bg" style="position:fixed; inset:0; z-index:-1;"></div>

    <div class="container" id="container"></div>

    <!-- JS Version (Use this OR compiled TypeScript) -->
    <script src="script.js"></script>

    <script>
        // ⚠️ IMPORTANT:
        // Your Prism code is React + TypeScript (uses OGL WebGL library)
        // It CANNOT run directly in plain HTML
        //
        // ✅ To use it, you have 2 options:
        // 1. Use React (recommended)
        // 2. Convert to vanilla JS (complex)
        //
        // 👉 EASY WAY (React setup):
        // npm create vite@latest my-app -- --template react
        // cd my-app
        // npm install ogl
        // paste your Prism.tsx and import it
        //
        // 👉 For THIS HTML version:
        // You can keep this as UI and later embed React build inside

        // ---------------------------------------
        // Example: tsc script.ts -> script.js

        const practicals = [
            "Basic HTML Structure", "Text Formatting", "Lists", "Hyperlinks", "Images", "Tables", "Forms", "Input Types", "Buttons", "Div & Span", "Semantic Tags", "Audio & Video", "Iframe", "Marquee", "Background", "CSS Styling", "Inline CSS", "Internal CSS", "External CSS", "Flexbox", "Grid", "Animations", "Transitions", "Responsive Design"
        ];

        const container = document.getElementById("container");

        function displayItems(list) {
            container.innerHTML = "";
            list.forEach((item, index) => {
                container.innerHTML += `
            <div class="card" onmousemove="tilt(event,this)">
                <h2>Practical ${index + 1}</h2>
                <p>${item}</p>
                <button onclick="openPractical('${item}')">Open</button>
            </div>`;
            });
        }

        function openPractical(name) {
            alert("Opening: " + name);
        }

        // Search
        const search = document.getElementById("search");
        search.addEventListener("keyup", () => {
            const value = search.value.toLowerCase();
            const filtered = practicals.filter(p => p.toLowerCase().includes(value));
            displayItems(filtered);
        });

        // Dark Mode
        function toggleMode() {
            document.getElementById("body").classList.toggle("dark");
        }

        // Cursor Glow
        const glow = document.getElementById("glow");
        document.addEventListener("mousemove", e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // 3D Tilt
        function tilt(e, el) {
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rotateX = ((y / rect.height) - 0.5) * 20;
            const rotateY = ((x / rect.width) - 0.5) * -20;

            el.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        // 🌟 PARTICLES + NEURAL LINES + MOUSE INTERACTION
        const pCanvas = document.getElementById("particleCanvas");
        const pCtx = pCanvas.getContext("2d");
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;

        let mouse = { x: null, y: null };
        window.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        let particles = [];
        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * pCanvas.width,
                y: Math.random() * pCanvas.height,
                r: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 1.5,
                dy: (Math.random() - 0.5) * 1.5
            });
        }

        function drawParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

            // draw particles
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;

                if (p.x < 0 || p.x > pCanvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > pCanvas.height) p.dy *= -1;

                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                pCtx.fillStyle = "rgba(255,255,255,0.9)";
                pCtx.fill();
            });

            // connect nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 100) {
                        pCtx.beginPath();
                        pCtx.moveTo(particles[i].x, particles[i].y);
                        pCtx.lineTo(particles[j].x, particles[j].y);
                        pCtx.strokeStyle = "rgba(255,255,255,0.1)";
                        pCtx.stroke();
                    }
                }
            }

            // mouse interaction glow
            if (mouse.x && mouse.y) {
                particles.forEach(p => {
                    let dx = p.x - mouse.x;
                    let dy = p.y - mouse.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        pCtx.beginPath();
                        pCtx.moveTo(p.x, p.y);
                        pCtx.lineTo(mouse.x, mouse.y);
                        pCtx.strokeStyle = "rgba(0,255,255,0.3)";
                        pCtx.stroke();
                    }
                });
            }

            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // 🌊 MULTI-LAYER WAVES (DEPTH EFFECT)
        const wCanvas = document.getElementById("waveCanvas");
        const wCtx = wCanvas.getContext("2d");
        wCanvas.width = window.innerWidth;
        wCanvas.height = 200;

        let t = 0;
        function drawWaves() {
            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);

            for (let layer = 0; layer < 3; layer++) {
                wCtx.beginPath();
                for (let x = 0; x < wCanvas.width; x++) {
                    let y = (30 + layer * 15) * Math.sin((x * 0.01) + t + layer) + (100 + layer * 10);
                    wCtx.lineTo(x, y);
                }
                wCtx.strokeStyle = `rgba(255,255,255,${0.2 - layer * 0.05})`;
                wCtx.stroke();
            }

            t += 0.03;
            requestAnimationFrame(drawWaves);
        }
        drawWaves();

        // 🌌 STARFIELD BACKGROUND
        const starCanvas = document.createElement("canvas");
        starCanvas.style.position = "fixed";
        starCanvas.style.top = 0;
        starCanvas.style.left = 0;
        starCanvas.style.width = "100%";
        starCanvas.style.height = "100%";
        starCanvas.style.zIndex = "-5";
        document.body.appendChild(starCanvas);

        const sCtx = starCanvas.getContext("2d");
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;

        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * starCanvas.width,
                y: Math.random() * starCanvas.height,
                z: Math.random() * starCanvas.width
            });
        }

        function drawStars() {
            sCtx.fillStyle = "black";
            sCtx.fillRect(0, 0, starCanvas.width, starCanvas.height);

            stars.forEach(s => {
                s.z -= 2;
                if (s.z <= 0) s.z = starCanvas.width;

                let x = (s.x - starCanvas.width / 2) * (starCanvas.width / s.z) + starCanvas.width / 2;
                let y = (s.y - starCanvas.height / 2) * (starCanvas.width / s.z) + starCanvas.height / 2;

                let size = (1 - s.z / starCanvas.width) * 3;

                sCtx.beginPath();
                sCtx.arc(x, y, size, 0, Math.PI * 2);
                sCtx.fillStyle = "white";
                sCtx.fill();
            });

            requestAnimationFrame(drawStars);
        }
        drawStars();

        // Load
        displayItems(practicals);
    </script>

</body>
